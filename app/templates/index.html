<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Customer Support Chatbot</h1>
            <p class="subtitle">Powered by RAG + Claude Haiku</p>
        </header>

        <div class="company-selector">
            <label for="company">Select a company:</label>
            <select id="company">
                {% for company in companies %}
                <option value="{{ company }}">{{ company }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="chat-box" id="chat-box">
            <div class="message bot">
                <span class="bubble">Hello! How can I help you today?</span>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" />
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const input = document.getElementById("user-input");

        input.addEventListener("keydown", function (e) {
            if (e.key === "Enter") sendMessage();
        });

        async function sendMessage() {
            const message = input.value.trim();
            const company = document.getElementById("company").value;
            if (!message) return;

            appendMessage(message, "user");
            input.value = "";

            const typing = appendMessage("...", "bot typing");

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message, company }),
                });
                const data = await response.json();
                typing.remove();
                appendMessage(data.reply, "bot");
            } catch (err) {
                typing.remove();
                appendMessage("An error occurred. Please try again.", "bot error");
            }
        }

        function appendMessage(text, type) {
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = `message ${type}`;
            const bubble = document.createElement("span");
            bubble.className = "bubble";
            bubble.textContent = text;
            div.appendChild(bubble);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
